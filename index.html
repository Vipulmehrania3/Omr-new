<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>NEET OMR Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --surface: rgba(255,255,255,0.06);
  --surface2: rgba(255,255,255,0.10);
  --surface3: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.16);
  --text: #F0F0F5;
  --text2: rgba(255,255,255,0.50);
  --accent: #5B8DEF;
  --accent2: #4ECDC4;
  --green: #4CAF82;
  --red: #E06B7A;
  --amber: #E8A838;
  --glass-blur: 16px;
  --radius: 16px;
  --radius-sm: 10px;
}
.light-mode {
  --bg: #F0EDE6;
  --surface: rgba(0,0,0,0.04);
  --surface2: rgba(0,0,0,0.07);
  --surface3: rgba(0,0,0,0.02);
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1A1A1F;
  --text2: rgba(0,0,0,0.42);
  --glass-blur: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  transition: background 0.6s ease, color 0.5s ease;
}

/* GLASS */
.glass {
  background: var(--surface);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}
.glass::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
  pointer-events:none;
}
.light-mode .glass::before {
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);
}
.glass::after {
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%,rgba(255,255,255,0.02) 100%);
  pointer-events:none;
}
.light-mode .glass::after {
  background:linear-gradient(135deg,rgba(255,255,255,0.25) 0%,transparent 40%,rgba(255,255,255,0.1) 100%);
}
.glass-strong {
  background: var(--surface2);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  position:relative;
  overflow:hidden;
}
.glass-strong::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
  pointer-events:none;
}

/* BTN */
.glow-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff;
  border:none;
  padding:14px 32px;
  border-radius:50px;
  font-family:'Inter',sans-serif;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition: transform 0.2s, box-shadow 0.3s;
  box-shadow: 0 4px 20px rgba(91,141,239,0.25);
}
.glow-btn:active { transform:scale(0.96); }
.glow-btn::after {
  content:'';
  position:absolute;
  top:-50%;left:-50%;
  width:200%;height:200%;
  background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,0.12) 50%,transparent 60%);
  transform:translateX(-100%);
  transition: transform 0.6s;
}
.glow-btn:hover::after { transform:translateX(100%); }

/* PAGES */
.page {
  display:none;
  min-height:100dvh;
  opacity:0;
  transform:translateY(20px);
}
.page.active {
  display:block;
  animation: pageIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes pageIn { to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes fadeInScale { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
@keyframes slideUp {
  from { opacity:0; transform:translateY(24px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes popIn {
  0% { opacity:0; transform:scale(0.8); }
  70% { transform:scale(1.04); }
  100% { opacity:1; transform:scale(1); }
}
@keyframes bounceIn {
  0% { opacity:0; transform:translateY(30px) scale(0.95); }
  60% { transform:translateY(-6px) scale(1.01); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes ringDraw { from { stroke-dashoffset: 440; } }
@keyframes float {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-8px) rotate(1.5deg); }
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.5; }
}

/* BG AMBIENCE */
.bg-glow {
  position:fixed;
  border-radius:50%;
  filter:blur(100px);
  pointer-events:none;
  z-index:0;
  will-change:auto;
}
.light-mode .bg-glow { opacity:0.06 !important; }

/* HEADER */
.app-header {
  position:sticky;top:0;z-index:100;
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,15,0.75);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.light-mode .app-header {
  background:rgba(240,237,230,0.8);
}
.app-title {
  font-weight:900;font-size:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* HOME */
.hero-icon {
  width:80px;height:80px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  margin:0 auto 16px;
  box-shadow:0 8px 32px rgba(91,141,239,0.25);
  animation: float 3s ease-in-out infinite;
}
.setup-card {
  padding:20px;
  margin-bottom:14px;
}
.setup-label {
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--text2);
  margin-bottom:10px;
}
.counter-row {
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.counter-btn {
  width:40px;height:40px;
  border-radius:12px;
  border:1px solid var(--border2);
  background:var(--surface);
  color:var(--text);
  font-size:18px;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.counter-btn:active { transform:scale(0.9); background:var(--surface2); }
.counter-val {
  font-family:'JetBrains Mono',monospace;
  font-size:28px;font-weight:700;
  min-width:60px;text-align:center;
  color:var(--text);
}
.timer-row {
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.timer-input {
  width:60px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:10px;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:20px;font-weight:700;
  text-align:center;
  padding:8px 4px;
  outline:none;
}
.timer-input:focus { border-color:var(--accent); }
.timer-sep { font-size:22px;font-weight:900;color:var(--text2); }

.test-name-input {
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:12px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:15px;font-weight:600;
  padding:12px 16px;
  outline:none;
  transition:border-color 0.3s;
}
.test-name-input:focus { border-color:var(--accent); }
.test-name-input::placeholder { color:var(--text2); }

/* TOGGLE */
.toggle-wrap {
  display:flex;align-items:center;gap:10px;justify-content:center;
}
.toggle-track {
  width:48px;height:26px;
  border-radius:13px;
  background:var(--surface2);
  border:1px solid var(--border2);
  position:relative;cursor:pointer;
  transition:background 0.3s;
}
.toggle-track.on { background:var(--accent); border-color:var(--accent); }
.toggle-knob {
  width:20px;height:20px;
  border-radius:50%;
  background:#fff;
  position:absolute;top:2px;left:2px;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.toggle-track.on .toggle-knob { transform:translateX(22px); }

/* THEME */
.theme-switch {
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;
  border-radius:20px;
  background:var(--surface);
  border:1px solid var(--border);
  cursor:pointer;
  font-size:13px;font-weight:600;
  color:var(--text2);
  transition:all 0.3s;
}
.theme-switch:hover { background:var(--surface2); }

/* RANGE */
input[type="range"] {
  -webkit-appearance:none;
  width:100%;height:6px;
  border-radius:3px;
  background:var(--surface2);
  outline:none;
  margin:8px 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:22px;height:22px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  cursor:pointer;
  box-shadow:0 2px 8px rgba(91,141,239,0.3);
}

/* OMR */
.omr-container {
  display:flex;
  min-height:100dvh;
}
.omr-main {
  flex:1;
  padding:12px;
  padding-top:56px;
  padding-right:60px;
  overflow-y:auto;
}
.q-row {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  margin-bottom:6px;
  border-radius:var(--radius-sm);
  transition: background 0.2s;
}
.q-num {
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:13px;
  color:var(--text2);
  min-width:28px;
  text-align:right;
}
.q-bubbles {
  display:flex;gap:10px;
}
.bubble {
  width:var(--bubble-size,42px);
  height:var(--bubble-size,42px);
  border-radius:50%;
  border:2px solid rgba(150,150,150,0.3);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:calc(var(--bubble-size,42px) * 0.35);
  color:var(--text2);
  cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
  user-select:none;
}
.bubble:active { transform:scale(0.88); }
.bubble.filled {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:var(--accent);
  color:#fff;
  box-shadow:0 0 14px rgba(91,141,239,0.3);
  transform:scale(1.08);
}

/* Q NAV */
.q-nav {
  width:54px;
  position:fixed;
  right:0;top:56px;bottom:0;
  background:rgba(10,10,15,0.6);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-left:1px solid var(--border);
  overflow-y:auto;
  z-index:90;
  display:flex;
  flex-direction:column;
  padding:6px 0;
  scrollbar-width:none;
}
.light-mode .q-nav { background:rgba(240,237,230,0.7); }
.q-nav::-webkit-scrollbar { display:none; }
.q-nav-item {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:6px 2px;
  margin:2px 6px;
  border-radius:8px;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:13px;
  color:var(--text2);
  cursor:pointer;
  transition:all 0.2s;
  min-height:36px;
}
.q-nav-item.answered {
  background:rgba(76,175,130,0.2);
  color:var(--green);
}
.q-nav-item.current {
  background:var(--surface2);
  color:var(--text);
}
.q-nav-item .nav-opt {
  font-size:9px;
  opacity:0.7;
}

/* SUBMIT BAR */
.submit-bar {
  position:fixed;top:56px;left:0;right:54px;z-index:95;
  padding:8px 12px;
  display:flex;align-items:center;gap:8px;
  background:rgba(10,10,15,0.65);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.light-mode .submit-bar {
  background:rgba(240,237,230,0.75);
}
.submit-btn {
  padding:10px 20px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  font-family:'Inter',sans-serif;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.3s;
  box-shadow:0 2px 12px rgba(91,141,239,0.2);
  white-space:nowrap;
  position:relative;
  overflow:hidden;
}
.submit-btn:active { transform:scale(0.95); }
.submit-btn::after {
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 50%);
  pointer-events:none;
}
.bubble-size-bar {
  flex:1;
  display:flex;align-items:center;gap:6px;
}
.bubble-size-bar label {
  font-size:10px;
  font-weight:700;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:0.5px;
  white-space:nowrap;
}
.bubble-size-bar input[type="range"] {
  flex:1;min-width:60px;margin:0;
}

/* TIMER */
.timer-display {
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:14px;
  padding:4px 10px;
  border-radius:8px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--amber);
}
.timer-display.urgent {
  color:var(--red);
  animation:pulse 1s infinite;
}

/* CHECK PAGE */
.check-area {
  width:100%;height:100dvh;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
  touch-action:none;
}
.check-bg {
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  pointer-events:none;
  z-index:1;
}
.check-card {
  width:240px;height:260px;
  border-radius:24px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:grab;
  position:relative;
  z-index:10;
  user-select:none;
  touch-action:none;
  will-change:transform;
  transition:box-shadow 0.15s, border-color 0.15s;
}
.check-card .q-label {
  font-size:12px;font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--text2);
  margin-bottom:8px;
}
.check-card .q-number {
  font-family:'JetBrains Mono',monospace;
  font-size:64px;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.check-progress-bar {
  position:absolute;
  top:56px;left:0;right:0;
  height:3px;
  background:var(--surface2);
  z-index:20;
}
.check-progress-fill {
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:0 2px 2px 0;
  transition:width 0.4s ease;
}
.check-progress-text {
  position:absolute;
  bottom:24px;left:0;right:0;
  text-align:center;
  font-size:13px;font-weight:600;
  color:var(--text2);
  z-index:20;
}
.corner-label {
  position:absolute;
  font-family:'JetBrains Mono',monospace;
  font-weight:900;
  font-size:20px;
  width:50px;height:50px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  opacity:0.3;
  z-index:15;
}
.corner-label.active {
  opacity:1;
  transform:scale(1.4);
}
.glow-trail {
  position:absolute;
  width:180px;height:180px;
  border-radius:50%;
  pointer-events:none;
  z-index:5;
  opacity:0;
  filter:blur(50px);
  transition:opacity 0.15s;
}

/* RESULTS */
.result-ring-wrap {
  width:200px;height:200px;
  margin:0 auto 20px;
  position:relative;
}
.result-ring-wrap svg {
  width:200px;height:200px;
  transform:rotate(-90deg);
}
.result-ring-bg {
  fill:none;
  stroke:var(--surface2);
  stroke-width:10;
}
.result-ring-fg {
  fill:none;
  stroke:url(#ringGrad);
  stroke-width:10;
  stroke-linecap:round;
  stroke-dasharray:440;
  stroke-dashoffset:440;
}
.result-ring-fg.animate {
  animation:ringDraw 1.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
.result-center {
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
.result-score {
  font-family:'JetBrains Mono',monospace;
  font-size:40px;font-weight:900;
  color:var(--text);
  opacity:0;
}
.result-score.show {
  animation:fadeIn 0.8s 0.8s forwards;
}
.result-total-label {
  font-size:12px;font-weight:700;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:1px;
  opacity:0;
}
.result-total-label.show {
  animation:fadeIn 0.6s 1s forwards;
}

.stat-grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin:16px 0;
}
.stat-card {
  text-align:center;
  padding:14px 8px;
  border-radius:var(--radius-sm);
}
.stat-val {
  font-family:'JetBrains Mono',monospace;
  font-size:24px;font-weight:900;
}
.stat-lbl {
  font-size:11px;font-weight:700;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-top:4px;
}

/* ANSWER SHEET */
.ans-row {
  display:flex;
  align-items:center;
  padding:12px 14px;
  margin-bottom:8px;
  border-radius:var(--radius-sm);
  gap:10px;
}
.ans-qnum {
  font-family:'JetBrains Mono',monospace;
  font-weight:900;
  font-size:15px;
  min-width:32px;
  color:var(--text2);
}
.ans-tags {
  display:flex;flex-wrap:wrap;gap:6px;flex:1;
}
.ans-tag {
  padding:4px 10px;
  border-radius:6px;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:12px;
}
.ans-marks {
  font-family:'JetBrains Mono',monospace;
  font-weight:900;
  font-size:14px;
  min-width:36px;
  text-align:right;
}

/* HISTORY */
.history-item {
  padding:14px 16px;
  margin-bottom:8px;
  cursor:pointer;
  transition:all 0.2s;
}
.history-item:active { transform:scale(0.98); }
.search-input {
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;
  padding:10px 14px;
  outline:none;
  margin-bottom:12px;
}
.search-input::placeholder { color:var(--text2); }

/* MODAL */
.modal-overlay {
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  z-index:200;
  animation:fadeIn 0.2s;
}
.modal-box {
  padding:24px;
  max-width:300px;
  width:90%;
  text-align:center;
}
.modal-box h3 {
  font-size:16px;font-weight:900;
  margin-bottom:8px;
}
.modal-box p {
  font-size:13px;color:var(--text2);
  margin-bottom:16px;
  line-height:1.5;
}
.modal-btns {
  display:flex;gap:10px;justify-content:center;
}
.modal-btn {
  padding:10px 20px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:var(--surface);
  color:var(--text);
  font-weight:700;font-size:13px;
  cursor:pointer;
  transition:all 0.2s;
}
.modal-btn:active { transform:scale(0.95); }
.modal-btn.confirm {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;
}

.toast {
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:12px;
  background:var(--surface2);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  font-size:13px;font-weight:700;
  z-index:300;
  animation:slideDown 0.4s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideDown {
  from { opacity:0;transform:translateX(-50%) translateY(-20px); }
  to { opacity:1;transform:translateX(-50%) translateY(0); }
}
</style>
</head>
<body>

<!-- BG AMBIENCE -->
<div class="bg-glow" style="width:280px;height:280px;top:-100px;left:-80px;background:var(--accent);opacity:0.12;"></div>
<div class="bg-glow" style="width:250px;height:250px;bottom:-80px;right:-100px;background:var(--accent2);opacity:0.10;"></div>
<div class="bg-glow" style="width:200px;height:200px;top:40%;left:50%;background:var(--amber);opacity:0.05;"></div>

<!-- ============ HOME PAGE ============ -->
<div class="page active" id="homePage">
  <div class="app-header">
    <div class="app-title">OMR Practice</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="theme-switch" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">Dark</span>
      </div>
      <div style="font-size:22px;cursor:pointer;padding:4px;" onclick="showPage('historyPage');renderHistory();">🕐</div>
    </div>
  </div>

  <div style="padding:20px 16px 100px;max-width:420px;margin:0 auto;">
    <div style="text-align:center;padding-top:20px;margin-bottom:24px;">
      <div class="hero-icon">📝</div>
      <h1 style="font-size:24px;font-weight:900;margin-bottom:4px;">NEET OMR Sheet</h1>
      <p style="font-size:13px;color:var(--text2);font-weight:600;">Practice. Check. Improve.</p>
    </div>

    <!-- TEST NAME -->
    <div class="glass setup-card" style="animation:bounceIn 0.6s both;">
      <div class="setup-label">Test Name</div>
      <input type="text" class="test-name-input" id="testNameInput" placeholder="e.g. Physics Chapter 5" maxlength="40">
    </div>

    <!-- QUESTION COUNT -->
    <div class="glass setup-card" style="animation:bounceIn 0.6s 0.1s both;">
      <div class="setup-label">Number of Questions</div>
      <div class="counter-row">
        <button class="counter-btn" onclick="changeQ(-10)">−10</button>
        <button class="counter-btn" onclick="changeQ(-1)">−1</button>
        <div class="counter-val" id="qCount">30</div>
        <button class="counter-btn" onclick="changeQ(1)">+1</button>
        <button class="counter-btn" onclick="changeQ(10)">+10</button>
      </div>
    </div>

    <!-- TIMER -->
    <div class="glass setup-card" style="animation:bounceIn 0.6s 0.2s both;">
      <div class="setup-label">Timer</div>
      <div class="toggle-wrap" style="margin-bottom:12px;">
        <span style="font-size:13px;font-weight:600;color:var(--text2);">Off</span>
        <div class="toggle-track" id="timerToggle" onclick="toggleTimer()">
          <div class="toggle-knob"></div>
        </div>
        <span style="font-size:13px;font-weight:600;color:var(--text2);">On</span>
      </div>
      <div class="timer-row" id="timerSetup" style="display:none;">
        <input type="number" class="timer-input" id="timerH" value="0" min="0" max="5" placeholder="H">
        <span class="timer-sep">:</span>
        <input type="number" class="timer-input" id="timerM" value="30" min="0" max="59" placeholder="M">
      </div>
    </div>

    <!-- START -->
    <div style="text-align:center;margin-top:20px;animation:bounceIn 0.6s 0.3s both;">
      <button class="glow-btn" onclick="startTest()" style="width:100%;padding:16px;font-size:16px;">
        🚀 Start Test
      </button>
    </div>
  </div>
</div>

<!-- ============ OMR PAGE ============ -->
<div class="page" id="omrPage">
  <div class="app-header" id="omrHeader">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="cursor:pointer;font-size:20px;" onclick="confirmExit()">←</span>
      <div>
        <div style="font-weight:900;font-size:14px;" id="omrTestName">Test</div>
        <div style="font-size:11px;color:var(--text2);font-weight:600;" id="omrQInfo"></div>
      </div>
    </div>
    <div class="timer-display" id="timerEl" style="display:none;">00:00</div>
  </div>

  <!-- SUBMIT BAR AT TOP -->
  <div class="submit-bar" id="submitBar">
    <button class="submit-btn" onclick="confirmSubmit()">✓ Submit</button>
    <div class="bubble-size-bar">
      <label>Size</label>
      <input type="range" min="30" max="60" value="42" id="omrBubbleSizeRange" oninput="liveUpdateBubbleSize(this.value)">
    </div>
  </div>

  <div class="omr-container">
    <div class="omr-main" id="omrMain" style="padding-top:104px;"></div>
    <div class="q-nav" id="qNav"></div>
  </div>
</div>

<!-- ============ CHECK PAGE ============ -->
<div class="page" id="checkPage">
  <div class="app-header">
    <div class="app-title">Answer Check</div>
    <div style="font-size:13px;font-weight:700;color:var(--text2);" id="checkCounter"></div>
  </div>
  <div class="check-progress-bar"><div class="check-progress-fill" id="checkProgressFill" style="width:0%;"></div></div>
  <div class="check-area" id="checkArea">
    <!-- Corner labels -->
    <div class="corner-label" id="cl1" style="top:80px;left:20px;background:rgba(91,141,239,0.12);color:var(--accent);border:1px solid rgba(91,141,239,0.2);">1</div>
    <div class="corner-label" id="cl2" style="top:80px;right:20px;background:rgba(232,168,56,0.12);color:var(--amber);border:1px solid rgba(232,168,56,0.2);">2</div>
    <div class="corner-label" id="cl3" style="bottom:80px;left:20px;background:rgba(76,175,130,0.12);color:var(--green);border:1px solid rgba(76,175,130,0.2);">3</div>
    <div class="corner-label" id="cl4" style="bottom:80px;right:20px;background:rgba(224,107,122,0.12);color:var(--red);border:1px solid rgba(224,107,122,0.2);">4</div>
    <!-- Glow trail -->
    <div class="glow-trail" id="glowTrail"></div>
    <div class="check-progress-text" id="checkProgressText"></div>
  </div>
</div>

<!-- ============ RESULT PAGE ============ -->
<div class="page" id="resultPage">
  <div class="app-header">
    <div class="app-title">Results</div>
    <div style="display:flex;gap:8px;">
      <button class="modal-btn" onclick="tryAgain()" style="font-size:12px;padding:6px 12px;">🔄 Retry</button>
      <button class="modal-btn" onclick="goHome()" style="font-size:12px;padding:6px 12px;">🏠 Home</button>
    </div>
  </div>
  <div style="padding:16px;max-width:420px;margin:0 auto;padding-bottom:60px;" id="resultContent"></div>
</div>

<!-- ============ HISTORY PAGE ============ -->
<div class="page" id="historyPage">
  <div class="app-header">
    <span style="cursor:pointer;font-size:20px;" onclick="showPage('homePage')">←</span>
    <div class="app-title">History</div>
    <div></div>
  </div>
  <div style="padding:16px;max-width:420px;margin:0 auto;" id="historyContent"></div>
</div>

<!-- ============ HISTORY DETAIL ============ -->
<div class="page" id="historyDetailPage">
  <div class="app-header">
    <span style="cursor:pointer;font-size:20px;" onclick="showPage('historyPage');renderHistory();">←</span>
    <div class="app-title">Exam Detail</div>
    <div></div>
  </div>
  <div style="padding:16px;max-width:420px;margin:0 auto;padding-bottom:60px;" id="historyDetailContent"></div>
</div>

<!-- MODAL CONTAINER -->
<div id="modalContainer"></div>

<script>
// ============ STATE ============
let questionCount = 30;
let bubbleSize = 42;
let timerEnabled = false;
let timerSeconds = 0;
let timerInterval = null;
let startTime = 0;
let userAnswers = {};
let answerKeys = {};
let testName = '';
let attemptedForCheck = [];
let checkIndex = 0;
let currentCard = null;
let currentCleanup = null;

// ============ HELPERS ============
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none';
    p.style.opacity = '0';
    p.style.transform = 'translateY(20px)';
  });
  const pg = document.getElementById(id);
  pg.style.display = 'block';
  void pg.offsetWidth;
  pg.classList.add('active');
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function showModal(title, text, onConfirm, onCancel) {
  const c = document.getElementById('modalContainer');
  c.innerHTML = `
    <div class="modal-overlay" onclick="event.target===this&&closeModal()">
      <div class="modal-box glass-strong">
        <h3>${title}</h3>
        <p>${text}</p>
        <div class="modal-btns">
          <button class="modal-btn" onclick="closeModal();${onCancel||''}">Cancel</button>
          <button class="modal-btn confirm" onclick="closeModal();${onConfirm}">Confirm</button>
        </div>
      </div>
    </div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML=''; }

function formatTime(s) {
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  if (h>0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ============ THEME ============
function toggleTheme() {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  document.getElementById('themeIcon').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isLight ? 'Light' : 'Dark';
  localStorage.setItem('omr-theme', isLight ? 'light' : 'dark');
}
(function(){
  if (localStorage.getItem('omr-theme') === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('themeIcon').textContent = '☀️';
    document.getElementById('themeLabel').textContent = 'Light';
  }
})();

// ============ SETUP ============
function changeQ(d) {
  questionCount = Math.max(1, Math.min(200, questionCount + d));
  document.getElementById('qCount').textContent = questionCount;
}
function updateBubbleSize(v) {
  bubbleSize = parseInt(v);
  document.getElementById('bubbleSizeVal') && (document.getElementById('bubbleSizeVal').textContent = v);
}
function liveUpdateBubbleSize(v) {
  bubbleSize = parseInt(v);
  document.documentElement.style.setProperty('--bubble-size', v + 'px');
}
function toggleTimer() {
  timerEnabled = !timerEnabled;
  document.getElementById('timerToggle').classList.toggle('on', timerEnabled);
  document.getElementById('timerSetup').style.display = timerEnabled ? 'flex' : 'none';
}

// ============ START TEST ============
function startTest() {
  testName = document.getElementById('testNameInput').value.trim() || ('Test ' + new Date().toLocaleDateString());
  userAnswers = {};
  answerKeys = {};

  if (timerEnabled) {
    const h = parseInt(document.getElementById('timerH').value) || 0;
    const m = parseInt(document.getElementById('timerM').value) || 0;
    timerSeconds = h * 3600 + m * 60;
    if (timerSeconds <= 0) { toast('Set a valid time'); return; }
  }

  startTime = Date.now();
  buildOMR();
  showPage('omrPage');
  document.getElementById('omrTestName').textContent = testName;
  document.getElementById('omrQInfo').textContent = questionCount + ' Questions';
  document.getElementById('omrBubbleSizeRange').value = bubbleSize;

  if (timerEnabled) {
    document.getElementById('timerEl').style.display = 'block';
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        toast('⏰ Time is up!');
        setTimeout(submitOMR, 1000);
      }
    }, 1000);
  } else {
    document.getElementById('timerEl').style.display = 'none';
  }
}

function updateTimerDisplay() {
  const el = document.getElementById('timerEl');
  el.textContent = formatTime(timerSeconds);
  el.classList.toggle('urgent', timerSeconds <= 60);
}

// ============ BUILD OMR ============
function buildOMR() {
  const main = document.getElementById('omrMain');
  const nav = document.getElementById('qNav');
  main.innerHTML = '';
  nav.innerHTML = '<div style="text-align:center;padding:6px 0;font-size:10px;font-weight:900;color:var(--text2);letter-spacing:1px;">NAV</div>';

  document.documentElement.style.setProperty('--bubble-size', bubbleSize + 'px');

  for (let i = 1; i <= questionCount; i++) {
    const row = document.createElement('div');
    row.className = 'q-row';
    row.id = 'qrow-' + i;
    row.style.animation = `slideUp 0.4s ${Math.min(i*0.02, 1)}s both`;
    row.innerHTML = `
      <div class="q-num">${i}.</div>
      <div class="q-bubbles">
        ${[1,2,3,4].map(o => `<div class="bubble" data-q="${i}" data-o="${o}" onclick="selectBubble(${i},${o})">${o}</div>`).join('')}
      </div>`;
    main.appendChild(row);

    const ni = document.createElement('div');
    ni.className = 'q-nav-item';
    ni.id = 'nav-' + i;
    ni.innerHTML = `<span>${i}</span><span class="nav-opt" id="navopt-${i}"></span>`;
    ni.onclick = () => {
      document.getElementById('qrow-' + i).scrollIntoView({ behavior:'smooth', block:'center' });
    };
    nav.appendChild(ni);
  }
}

// ============ BUBBLE SELECT ============
function selectBubble(q, o) {
  const current = userAnswers[q];

  if (current === o) {
    showModal('Deselect Answer', `Remove answer for Q${q}?`, `doDeselect(${q})`);
    return;
  }

  if (current !== undefined && current !== o) {
    showModal('Change Answer', `Change Q${q} from ${current} to ${o}?`, `doSelect(${q},${o})`);
    return;
  }

  doSelect(q, o);
}

function doSelect(q, o) {
  userAnswers[q] = o;
  updateBubbleUI(q);
  updateNavItem(q);
  // Auto-scroll to next question
  const nextRow = document.getElementById('qrow-' + (q + 1));
  if (nextRow) {
    setTimeout(() => {
      nextRow.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 150);
  }
}

function doDeselect(q) {
  delete userAnswers[q];
  updateBubbleUI(q);
  updateNavItem(q);
}

function updateBubbleUI(q) {
  const bubbles = document.querySelectorAll(`.bubble[data-q="${q}"]`);
  bubbles.forEach(b => {
    const o = parseInt(b.dataset.o);
    b.classList.toggle('filled', userAnswers[q] === o);
  });
}

function updateNavItem(q) {
  const ni = document.getElementById('nav-' + q);
  const opt = document.getElementById('navopt-' + q);
  if (userAnswers[q] !== undefined) {
    ni.classList.add('answered');
    opt.textContent = '→' + userAnswers[q];
  } else {
    ni.classList.remove('answered');
    opt.textContent = '';
  }
}

// ============ SUBMIT ============
function confirmSubmit() {
  const attempted = Object.keys(userAnswers).length;
  showModal(
    'Submit Test',
    `You have attempted ${attempted} of ${questionCount} questions. Are you sure you want to submit?`,
    'submitOMR()'
  );
}

function submitOMR() {
  if (timerInterval) clearInterval(timerInterval);

  attemptedForCheck = [];
  for (let i = 1; i <= questionCount; i++) {
    if (userAnswers[i] !== undefined) {
      attemptedForCheck.push(i);
    }
  }

  if (attemptedForCheck.length === 0) {
    toast('No questions attempted');
    showResults();
    return;
  }

  checkIndex = 0;
  showPage('checkPage');
  showCheckCard();
}

function confirmExit() {
  showModal('Exit Test', 'Your progress will be lost. Are you sure?', 'exitTest()');
}
function exitTest() {
  if (timerInterval) clearInterval(timerInterval);
  goHome();
}
function goHome() { showPage('homePage'); }

// ============ CHECK SYSTEM ============
const checkColors = {
  1: { color: '#5B8DEF', label: 'cl1' },  // top-left → blue
  2: { color: '#E8A838', label: 'cl2' },  // top-right → amber
  3: { color: '#4CAF82', label: 'cl3' },  // bottom-left → green
  4: { color: '#E06B7A', label: 'cl4' },  // bottom-right → rose
};

function showCheckCard() {
  // Clean up previous listeners
  if (currentCleanup) {
    currentCleanup();
    currentCleanup = null;
  }

  if (checkIndex >= attemptedForCheck.length) {
    showResults();
    return;
  }

  const qNum = attemptedForCheck[checkIndex];
  const total = attemptedForCheck.length;
  document.getElementById('checkCounter').textContent = `${checkIndex+1} / ${total}`;
  document.getElementById('checkProgressText').textContent = `Swipe to corners • Q${checkIndex+1} of ${total}`;
  document.getElementById('checkProgressFill').style.width = ((checkIndex / total) * 100) + '%';

  // Reset corners
  ['cl1','cl2','cl3','cl4'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.style.boxShadow = '';
    el.style.background = '';
    // Reset background
    if (id === 'cl1') el.style.background = 'rgba(91,141,239,0.12)';
    if (id === 'cl2') el.style.background = 'rgba(232,168,56,0.12)';
    if (id === 'cl3') el.style.background = 'rgba(76,175,130,0.12)';
    if (id === 'cl4') el.style.background = 'rgba(224,107,122,0.12)';
  });

  // Remove old card
  if (currentCard) {
    currentCard.remove();
    currentCard = null;
  }

  // Create card
  const card = document.createElement('div');
  card.className = 'check-card glass-strong';
  card.innerHTML = `
    <div class="q-label">Question</div>
    <div class="q-number">${qNum}</div>`;
  card.style.animation = 'popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both';

  const area = document.getElementById('checkArea');
  area.insertBefore(card, document.getElementById('checkProgressText'));
  currentCard = card;

  // Drag state
  let isDragging = false;
  let sx = 0, sy = 0;
  let dx = 0, dy = 0;
  const sensitivity = 1.5;
  const threshold = 40;
  const trail = document.getElementById('glowTrail');

  function getActiveCorner(x, y) {
    const ax = Math.abs(x), ay = Math.abs(y);
    if (ax < threshold && ay < threshold) return 0;
    if (x < 0 && y < 0) return 1;
    if (x > 0 && y < 0) return 2;
    if (x < 0 && y > 0) return 3;
    if (x > 0 && y > 0) return 4;
    return 0;
  }

  function onStart(e) {
    e.preventDefault();
    isDragging = true;
    const t = e.touches ? e.touches[0] : e;
    sx = t.clientX;
    sy = t.clientY;
    card.style.transition = 'none';
    card.style.animation = 'none';
    trail.style.transition = 'none';
  }

  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    dx = (t.clientX - sx) * sensitivity;
    dy = (t.clientY - sy) * sensitivity;

    const rot = dx * 0.06;
    card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;

    const corner = getActiveCorner(dx, dy);

    // Update corners
    [1,2,3,4].forEach(c => {
      const el = document.getElementById(checkColors[c].label);
      if (c === corner) {
        el.classList.add('active');
        el.style.boxShadow = `0 0 24px ${checkColors[c].color}60`;
        el.style.background = checkColors[c].color + '30';
      } else {
        el.classList.remove('active');
        el.style.boxShadow = '';
        if (c === 1) el.style.background = 'rgba(91,141,239,0.12)';
        if (c === 2) el.style.background = 'rgba(232,168,56,0.12)';
        if (c === 3) el.style.background = 'rgba(76,175,130,0.12)';
        if (c === 4) el.style.background = 'rgba(224,107,122,0.12)';
      }
    });

    // Card glow + trail
    if (corner > 0) {
      const clr = checkColors[corner].color;
      card.style.borderColor = clr;
      card.style.boxShadow = `0 0 30px ${clr}40, 0 0 60px ${clr}18`;
      trail.style.opacity = '0.35';
      trail.style.background = `radial-gradient(circle, ${clr}50, transparent)`;
      trail.style.left = (t.clientX - 90) + 'px';
      trail.style.top = (t.clientY - 90) + 'px';
    } else {
      card.style.borderColor = 'var(--border2)';
      card.style.boxShadow = '';
      trail.style.opacity = '0';
    }
  }

  function onEnd(e) {
    if (!isDragging) return;
    isDragging = false;

    const corner = getActiveCorner(dx, dy);
    trail.style.transition = 'opacity 0.3s';
    trail.style.opacity = '0';

    if (corner > 0) {
      // Register answer key
      answerKeys[qNum] = corner;

      // Fly out
      const flyX = dx * 4;
      const flyY = dy * 4;
      const flyRot = dx * 0.3;
      const clr = checkColors[corner].color;

      card.style.transition = 'transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.45s ease';
      card.style.transform = `translate(${flyX}px, ${flyY}px) rotate(${flyRot}deg) scale(0.4)`;
      card.style.opacity = '0';
      card.style.boxShadow = `0 0 60px ${clr}`;

      // Reset corners
      [1,2,3,4].forEach(c => {
        const el = document.getElementById(checkColors[c].label);
        el.classList.remove('active');
        el.style.boxShadow = '';
      });

      setTimeout(() => {
        checkIndex++;
        showCheckCard();
      }, 400);
    } else {
      // Snap back
      card.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s, box-shadow 0.3s';
      card.style.transform = 'translate(0,0) rotate(0deg)';
      card.style.borderColor = 'var(--border2)';
      card.style.boxShadow = '';
      dx = 0;
      dy = 0;
    }
  }

  card.addEventListener('touchstart', onStart, {passive:false});
  card.addEventListener('mousedown', onStart);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchend', onEnd);
  document.addEventListener('mouseup', onEnd);

  // Store cleanup function
  currentCleanup = () => {
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchend', onEnd);
    document.removeEventListener('mouseup', onEnd);
  };
}

// ============ RESULTS ============
function showResults() {
  const timeTaken = Math.round((Date.now() - startTime) / 1000);
  let correct = 0, wrong = 0, skipped = 0;
  let details = [];

  for (let i = 1; i <= questionCount; i++) {
    const ua = userAnswers[i];
    const ak = answerKeys[i];

    if (ua === undefined) {
      skipped++;
      details.push({ q:i, status:'skipped', user:null, key:null, marks:0 });
    } else if (ak === undefined) {
      skipped++;
      details.push({ q:i, status:'skipped', user:ua, key:null, marks:0 });
    } else if (ua === ak) {
      correct++;
      details.push({ q:i, status:'correct', user:ua, key:ak, marks:4 });
    } else {
      wrong++;
      details.push({ q:i, status:'wrong', user:ua, key:ak, marks:-1 });
    }
  }

  const totalMarks = correct * 4 - wrong * 1;
  const maxMarks = questionCount * 4;
  const pct = maxMarks > 0 ? Math.round((Math.max(0, totalMarks) / maxMarks) * 100) : 0;
  const dashOffset = 440 - (440 * pct / 100);

  // Save to history
  const record = {
    id: Date.now(),
    name: testName,
    date: new Date().toLocaleString(),
    questionCount,
    correct, wrong, skipped,
    totalMarks, maxMarks,
    timeTaken,
    details
  };
  const hist = JSON.parse(localStorage.getItem('omr-history') || '[]');
  hist.unshift(record);
  localStorage.setItem('omr-history', JSON.stringify(hist));

  // Render
  showPage('resultPage');
  const rc = document.getElementById('resultContent');
  rc.innerHTML = `
    <div style="text-align:center;margin-top:10px;margin-bottom:20px;">
      <div style="font-size:20px;font-weight:900;margin-bottom:4px;">${testName}</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;">
        ⏱ ${formatTime(timeTaken)} • ${questionCount} Questions
      </div>
    </div>

    <div class="result-ring-wrap">
      <svg viewBox="0 0 160 160">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--accent)"/>
            <stop offset="100%" stop-color="var(--accent2)"/>
          </linearGradient>
        </defs>
        <circle cx="80" cy="80" r="70" class="result-ring-bg"/>
        <circle cx="80" cy="80" r="70" class="result-ring-fg animate"
                style="stroke-dashoffset:${dashOffset};"/>
      </svg>
      <div class="result-center">
        <div class="result-score show">${totalMarks}</div>
        <div class="result-total-label show">of ${maxMarks}</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card glass" style="animation:popIn 0.5s 0.3s both;">
        <div class="stat-val" style="color:var(--green);">${correct}</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-card glass" style="animation:popIn 0.5s 0.4s both;">
        <div class="stat-val" style="color:var(--red);">${wrong}</div>
        <div class="stat-lbl">Wrong</div>
      </div>
      <div class="stat-card glass" style="animation:popIn 0.5s 0.5s both;">
        <div class="stat-val" style="color:var(--text2);">${skipped}</div>
        <div class="stat-lbl">Skipped</div>
      </div>
    </div>

    <div style="margin-top:20px;">
      <div style="font-size:14px;font-weight:900;margin-bottom:12px;letter-spacing:0.5px;">ANSWER SHEET</div>
      ${details.map((d, idx) => renderAnswerRow(d, idx)).join('')}
    </div>`;
}

function renderAnswerRow(d, idx) {
  const delay = 0.5 + idx * 0.03;

  if (d.status === 'skipped') {
    return `
      <div class="ans-row glass" style="animation:slideUp 0.4s ${delay}s both;">
        <div class="ans-qnum">${d.q}.</div>
        <div class="ans-tags">
          <span class="ans-tag" style="background:var(--surface2);color:var(--text2);">Unattempted</span>
        </div>
        <div class="ans-marks" style="color:var(--text2);">0</div>
      </div>`;
  }

  if (d.status === 'correct') {
    return `
      <div class="ans-row glass" style="animation:slideUp 0.4s ${delay}s both;">
        <div class="ans-qnum">${d.q}.</div>
        <div class="ans-tags">
          <span class="ans-tag" style="background:rgba(76,175,130,0.15);color:var(--green);">Key: ${d.key}</span>
          <span class="ans-tag" style="background:rgba(91,141,239,0.15);color:var(--accent);">You: ${d.user}</span>
        </div>
        <div class="ans-marks" style="color:var(--green);">+4</div>
      </div>`;
  }

  return `
    <div class="ans-row glass" style="animation:slideUp 0.4s ${delay}s both;">
      <div class="ans-qnum">${d.q}.</div>
      <div class="ans-tags">
        <span class="ans-tag" style="background:rgba(76,175,130,0.15);color:var(--green);">Key: ${d.key}</span>
        <span class="ans-tag" style="background:rgba(224,107,122,0.15);color:var(--red);">You: ${d.user}</span>
      </div>
      <div class="ans-marks" style="color:var(--red);">−1</div>
    </div>`;
}

// ============ TRY AGAIN ============
function tryAgain() {
  userAnswers = {};
  answerKeys = {};
  startTime = Date.now();
  buildOMR();
  showPage('omrPage');
  document.getElementById('omrBubbleSizeRange').value = bubbleSize;

  if (timerEnabled) {
    const h = parseInt(document.getElementById('timerH').value) || 0;
    const m = parseInt(document.getElementById('timerM').value) || 0;
    timerSeconds = h * 3600 + m * 60;
    document.getElementById('timerEl').style.display = 'block';
    updateTimerDisplay();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        toast('⏰ Time is up!');
        setTimeout(submitOMR, 1000);
      }
    }, 1000);
  }
}

// ============ HISTORY ============
function renderHistory() {
  const hist = JSON.parse(localStorage.getItem('omr-history') || '[]');
  const hc = document.getElementById('historyContent');

  if (hist.length === 0) {
    hc.innerHTML = `
      <div style="text-align:center;padding:60px 20px;">
        <div style="font-size:48px;margin-bottom:16px;opacity:0.3;">📋</div>
        <div style="font-size:15px;font-weight:700;color:var(--text2);">No exams yet</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px;">Complete a test to see it here</div>
      </div>`;
    return;
  }

  hc.innerHTML = `
    <input type="text" class="search-input" placeholder="🔍 Search by test name..." oninput="filterHistory(this.value)">
    <div id="historyList">
      ${hist.map((h, i) => renderHistoryItem(h, i)).join('')}
    </div>
    <div style="text-align:center;margin-top:20px;">
      <button class="modal-btn" style="color:var(--red);border-color:var(--red);" onclick="confirmClearHistory()">
        🗑 Clear All History
      </button>
    </div>`;
}

function renderHistoryItem(h, i) {
  return `
    <div class="history-item glass" style="animation:slideUp 0.4s ${i*0.05}s both;" data-name="${(h.name||'').toLowerCase()}" onclick="showHistoryDetail(${h.id})">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-weight:900;font-size:15px;">${h.name || 'Untitled'}</div>
        <div style="font-size:11px;color:var(--text2);font-weight:600;">${h.date}</div>
      </div>
      <div style="display:flex;gap:12px;font-size:12px;font-weight:700;">
        <span style="color:var(--text2);">${h.questionCount}Q</span>
        <span style="color:var(--green);">✓${h.correct}</span>
        <span style="color:var(--red);">✗${h.wrong}</span>
        <span style="color:var(--text2);">○${h.skipped}</span>
        <span style="color:var(--accent);margin-left:auto;">${h.totalMarks}/${h.maxMarks}</span>
      </div>
      ${h.timeTaken ? `<div style="font-size:11px;color:var(--text2);margin-top:4px;font-weight:600;">⏱ ${formatTime(h.timeTaken)}</div>` : ''}
    </div>`;
}

function filterHistory(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('#historyList .history-item').forEach(item => {
    const name = item.getAttribute('data-name') || '';
    item.style.display = name.includes(q) ? '' : 'none';
  });
}

function confirmClearHistory() {
  showModal('Clear History', 'Delete all saved exams? This cannot be undone.', 'clearHistory()');
}
function clearHistory() {
  localStorage.removeItem('omr-history');
  renderHistory();
  toast('History cleared');
}

function showHistoryDetail(id) {
  const hist = JSON.parse(localStorage.getItem('omr-history') || '[]');
  const record = hist.find(h => h.id === id);
  if (!record) return;

  showPage('historyDetailPage');
  const hdc = document.getElementById('historyDetailContent');

  const pct = record.maxMarks > 0 ? Math.round((Math.max(0, record.totalMarks) / record.maxMarks) * 100) : 0;
  const dashOffset = 440 - (440 * pct / 100);

  hdc.innerHTML = `
    <div style="text-align:center;margin-top:10px;margin-bottom:20px;">
      <div style="font-size:20px;font-weight:900;margin-bottom:4px;">${record.name || 'Untitled'}</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;">
        ${record.date} • ⏱ ${record.timeTaken ? formatTime(record.timeTaken) : 'N/A'}
      </div>
    </div>

    <div class="result-ring-wrap">
      <svg viewBox="0 0 160 160">
        <defs>
          <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--accent)"/>
            <stop offset="100%" stop-color="var(--accent2)"/>
          </linearGradient>
        </defs>
        <circle cx="80" cy="80" r="70" class="result-ring-bg"/>
        <circle cx="80" cy="80" r="70" class="result-ring-fg animate"
                style="stroke-dashoffset:${dashOffset};stroke:url(#ringGrad2);"/>
      </svg>
      <div class="result-center">
        <div class="result-score show">${record.totalMarks}</div>
        <div class="result-total-label show">of ${record.maxMarks}</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card glass" style="animation:popIn 0.5s 0.3s both;">
        <div class="stat-val" style="color:var(--green);">${record.correct}</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-card glass" style="animation:popIn 0.5s 0.4s both;">
        <div class="stat-val" style="color:var(--red);">${record.wrong}</div>
        <div class="stat-lbl">Wrong</div>
      </div>
      <div class="stat-card glass" style="animation:popIn 0.5s 0.5s both;">
        <div class="stat-val" style="color:var(--text2);">${record.skipped}</div>
        <div class="stat-lbl">Skipped</div>
      </div>
    </div>

    <div style="margin-top:20px;">
      <div style="font-size:14px;font-weight:900;margin-bottom:12px;letter-spacing:0.5px;">ANSWER SHEET</div>
      ${record.details.map((d, idx) => renderAnswerRow(d, idx)).join('')}
    </div>`;
}
</script>
</body>
</html>
